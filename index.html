<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie | Smart Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #5D5FEF; /* Soft Purple-Blue */
            --bg: #F3F5F9;
            --white: #FFFFFF;
            --text: #1A1C21;
            --text-light: #64748B;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            --border: #E2E8F0;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            padding: 20px;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px;
            background: var(--white);
            border-radius: 24px;
            padding: 40px 30px;
            margin-right: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 50px;
        }

        .badge {
            background: #ECFDF5;
            color: #10B981;
            font-size: 11px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 100px;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* --- CHAT HUB --- */
        .chat-container {
            flex-grow: 1;
            background: var(--white);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
        }

        #chat-window {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bubble {
            max-width: 75%;
            padding: 16px 22px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
        }

        .duckie-bubble {
            background: var(--bg);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user-bubble {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* --- INPUT BAR --- */
        .input-bar {
            padding: 30px 40px;
            background: var(--white);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        input {
            flex-grow: 1;
            background: var(--bg);
            border: 1px solid transparent;
            border-radius: 14px;
            padding: 16px 20px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(93, 95, 239, 0.1);
        }

        .btn {
            height: 52px;
            padding: 0 24px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-send {
            background: var(--primary);
            color: white;
        }

        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(93, 95, 239, 0.3); }

        .btn-mic {
            background: #FEE2E2;
            color: #EF4444;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <span>🦆</span> Duckie
        </div>
        
        <div class="badge">● Systems Active</div>

        <div style="margin-top: 30px;">
            <p style="font-size: 12px; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">Operator</p>
            <p style="font-weight: 600; font-size: 15px;">Dhairya Poojara</p>
            <p style="font-size: 13px; color: var(--text-light); margin-top: 4px;">ID: KU2507U0161</p>
        </div>

        <div style="margin-top: auto;">
            <p style="font-size: 12px; color: var(--text-light);">© 2026 Karnavati University</p>
        </div>
    </aside>

    <main class="chat-container">
        <div id="chat-window">
            <div class="bubble duckie-bubble">
                Hello Dhairya. I'm ready to help you with your task automation. What are we working on?
            </div>
        </div>

        <div class="input-bar">
            <input type="text" id="user-input" placeholder="Type your command..." onkeypress="handleEnter(event)">
            <button class="btn btn-mic">🎤</button>
            <button class="btn btn-send" onclick="sendCommand()">EXECUTE</button>
        </div>
    </main>

    <script>
        function sendCommand() {
            const input = document.getElementById('user-input');
            const win = document.getElementById('chat-window');

            if (!input.value) return;

            win.innerHTML += `<div class="bubble user-bubble">${input.value}</div>`;
            
            const val = input.value;
            input.value = "";

            fetch('/execute', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: val })
            })
            .then(res => res.json())
            .then(data => {
                win.innerHTML += `<div class="bubble duckie-bubble">🦆 ${data.message}</div>`;
                win.scrollTop = win.scrollHeight;
            });
        }
    </script>
</body>
</html>
